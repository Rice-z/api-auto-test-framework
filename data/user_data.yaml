# ============================================
# 用户接口测试数据
# 存放路径: data/user_data.yaml
# ============================================
# 这些用例演示：登录之后如何测试需要认证的接口

test_cases:
  - name: "获取用户列表-验证Token已携带"
    path: "/api/v1/users"
    method: "GET"
    expected:
      code: 200
      check: "has_users"    # 验证返回了用户列表

  - name: "获取用户信息-验证Token"
    path: "/api/v1/user/profile"
    method: "GET"
    expected:
      code: 200
      check: "has_profile"  # 验证返回了用户信息

  - name: "Token过期-自动刷新并重试"
    path: "/api/v1/token_expired_test"
    method: "GET"
    expected:
      code: 200
      check: "auto_refresh"  # 验证 Token 过期后自动刷新并重试成功
